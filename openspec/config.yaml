schema: spec-driven
project: finance-dashboard

context: |
  Tech stack: Astro 5.x + TypeScript 5.9 (strict) + Preact 10.x + Tailwind CSS 3.4 + Chart.js 4.x
  Architecture: Clean Architecture (domain, application, infrastructure, presentation) with path aliases
  Testing: No test runner detected — strict TDD unavailable
  Style: Tailwind CSS, singleton pattern for services/repos, Spanish UI (es-AR, ARS)
  Deployment: GitHub Pages (ScissorSevens.github.io/finance-dashboard)

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Use Clean Architecture: domain (entities, value objects), application (use cases), infrastructure (repositories, services), presentation (components, pages)
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  runner: None
  strict_tdd: false
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  quality:
    linter: Not configured
    type_checker: "astro check (TypeScript strict)"
    formatter: Not configured
  recommendation: Install vitest for unit/integration testing. Add eslint + prettier for code quality.